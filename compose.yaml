services:
  bot:
    build: .
    image: emoji-trigger-agent:latest
    env_file:
      - .env
    init: true
    depends_on:
      - llm
    volumes:
      - ./outputs:/app/outputs

  llm:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda-b8660
    volumes:
      - cache:/root/.cache/
    ports:
      - "8080:8080"
    init: true
    environment:
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_JINJA=1
      - LLAMA_ARG_CTX_SIZE=65536
      - LLAMA_ARG_N_PARALLEL=1
      - LLAMA_ARG_CACHE_TYPE_K=q8_0
      - LLAMA_ARG_CACHE_TYPE_V=q8_0
      - LLAMA_ARG_FIT=off
      - LLAMA_ARG_HF_REPO=ggml-org/gemma-4-E4B-it-GGUF
      - LLAMA_ARG_HF_FILE=gemma-4-e4b-it-Q4_K_M.gguf
      - LLAMA_ARG_ALIAS=gemma-4-e4b
      - LLAMA_ARG_MMPROJ_AUTO=0
    devices:
      - "nvidia.com/gpu=all"

volumes:
  cache:
