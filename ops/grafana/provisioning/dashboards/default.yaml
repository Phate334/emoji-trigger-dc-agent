apiVersion: 1

providers:
  - name: Emoji Trigger Agent Dashboards
    orgId: 1
    folder: Emoji Trigger Agent
    type: file
    disableDeletion: false
    allowUiUpdates: false
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
